<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band Communication - Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #e8910e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 32px;
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 600px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .login-left {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
    }

    .logo-section h1 {
      font-size: 28px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 8px;
    }

    .logo-section p {
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.2s;
      background: #f9fafb;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
    }

    .input-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 18px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #3b82f6;
    }

    .forgot-password {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }

    .login-btn:hover {
      background: #1e3a8a;
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      color: #9ca3af;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      padding: 0 16px;
    }

    .social-login {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border: 1px solid #e5e7eb;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .social-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .signup-prompt {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: #6b7280;
    }

    .signup-prompt a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .login-right {
      flex: 1;
      position: relative;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-container {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-right {
        display: none;
      }
      
      .login-left {
        padding: 40px 30px;
      }
    }

    /* Toggle between login and signup */
    .toggle-form {
      text-align: center;
      margin-top: 20px;
    }

    .toggle-form button {
      background: none;
      border: none;
      color: #3b82f6;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <div class="logo-section">
        <!-- Church/Band Icon -->
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#1e40af"/>
          <path d="M2 17L12 22L22 17" stroke="#1e40af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#1e40af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>EOC BAND LIVE CHAT</h1>
        <p>Please enter your details to sign in</p>
      </div>

      <div id="error" class="error-message"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="Enter your email" required>
            <span class="input-icon">✉</span>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required>
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox">
            <span>Remember for 30 days</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Sign in</button>
      </form>

      <!-- Signup Form (Hidden by default) -->
      <form id="signupForm" class="hidden">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
            <span class="input-icon">✉</span>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="signupPassword" placeholder="Create a password" required>
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <button type="submit" class="login-btn">Create Account</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="social-login">
        <button class="social-btn" onclick="signInWithGoogle()" title="Sign in with Google">
          <!-- Google Icon -->
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
        </button>
      </div>

      <div class="toggle-form">
        <span id="toggleText">Don't have an account?</span>
        <button type="button" id="toggleBtn" onclick="toggleForm()">Sign up</button>
      </div>
    </div>

    <div class="login-right">
      <div class="image-container">
        <!-- Replace this src with your image file -->
        <img src="./assets/img/bandChat_Login.png" alt="Church worship" id="rightImage">
      </div>
    </div>
  </div>

  <script>
    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA6P-18fESPm-96wUKFxBePjrNdBeIaEEg",
        authDomain: "church-band-comms.firebaseapp.com",
        databaseURL: "https://church-band-comms-default-rtdb.firebaseio.com",
        projectId: "church-band-comms",
        storageBucket: "church-band-comms.firebasestorage.app",
        messagingSenderId: "105843589291",
        appId: "1:105843589291:web:8c754efeb91e1597cdf7ee"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let isLogin = true;

    function toggleForm() {
      isLogin = !isLogin;
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('signupForm').classList.toggle('hidden');
      document.getElementById('toggleText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      document.getElementById('toggleBtn').textContent = isLogin ? "Sign up" : "Sign in";
      hideError();
    }

    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    // Email/Password Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      auth.signInWithEmailAndPassword(email, password)
        .then(() => window.location.href = 'dashboard.html')
        .catch(e => showError(e.message));
    });

    // Email/Password Signup
    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => window.location.href = 'dashboard.html')
        .catch(e => showError(e.message));
    });

    // Google Sign In
    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => window.location.href = 'dashboard.html')
        .catch(e => showError(e.message));
    }

    // Auto-redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
